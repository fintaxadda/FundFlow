<svg xmlns="http://www.w3.org/2000/svg" width="384" height="384" viewBox="0 0 384 384">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1829"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5a0"/>
      <stop offset="100%" style="stop-color:#00b37a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="384" height="384" rx="84" fill="url(#bg)"/>
  <!-- Grid lines subtle -->
  <line x1="57" y1="192" x2="326" y2="192" stroke="#1e2d45" stroke-width="5"/>
  <line x1="192" y1="57" x2="192" y2="326" stroke="#1e2d45" stroke-width="5"/>
  <!-- Chart wave path -->
  <polyline 
    points="46,276 107,211 161,238 222,134 276,107 337,69"
    fill="none" stroke="url(#wave)" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dot at peak -->
  <circle cx="337" cy="69" r="23" fill="#00e5a0"/>
  <!-- F letter mark subtle -->
  <text x="53" y="145" font-family="serif" font-size="69" font-weight="bold" fill="rgba(0,229,160,0.25)">F</text>
</svg>