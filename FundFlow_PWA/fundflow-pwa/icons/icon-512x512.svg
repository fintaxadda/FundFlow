<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1829"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5a0"/>
      <stop offset="100%" style="stop-color:#00b37a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Grid lines subtle -->
  <line x1="76" y1="256" x2="435" y2="256" stroke="#1e2d45" stroke-width="7"/>
  <line x1="256" y1="76" x2="256" y2="435" stroke="#1e2d45" stroke-width="7"/>
  <!-- Chart wave path -->
  <polyline 
    points="61,368 143,281 215,317 296,179 368,143 450,92"
    fill="none" stroke="url(#wave)" stroke-width="23" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dot at peak -->
  <circle cx="450" cy="92" r="30" fill="#00e5a0"/>
  <!-- F letter mark subtle -->
  <text x="71" y="194" font-family="serif" font-size="92" font-weight="bold" fill="rgba(0,229,160,0.25)">F</text>
</svg>