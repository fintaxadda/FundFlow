<svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 72 72">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1829"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5a0"/>
      <stop offset="100%" style="stop-color:#00b37a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="72" height="72" rx="15" fill="url(#bg)"/>
  <!-- Grid lines subtle -->
  <line x1="10" y1="36" x2="61" y2="36" stroke="#1e2d45" stroke-width="1"/>
  <line x1="36" y1="10" x2="36" y2="61" stroke="#1e2d45" stroke-width="1"/>
  <!-- Chart wave path -->
  <polyline 
    points="8,51 20,39 30,44 41,25 51,20 63,12"
    fill="none" stroke="url(#wave)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dot at peak -->
  <circle cx="63" cy="12" r="4" fill="#00e5a0"/>
  <!-- F letter mark subtle -->
  <text x="10" y="27" font-family="serif" font-size="12" font-weight="bold" fill="rgba(0,229,160,0.25)">F</text>
</svg>