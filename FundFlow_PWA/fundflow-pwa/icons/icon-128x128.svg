<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1829"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5a0"/>
      <stop offset="100%" style="stop-color:#00b37a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Grid lines subtle -->
  <line x1="19" y1="64" x2="108" y2="64" stroke="#1e2d45" stroke-width="1"/>
  <line x1="64" y1="19" x2="64" y2="108" stroke="#1e2d45" stroke-width="1"/>
  <!-- Chart wave path -->
  <polyline 
    points="15,92 35,70 53,79 74,44 92,35 112,23"
    fill="none" stroke="url(#wave)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dot at peak -->
  <circle cx="112" cy="23" r="7" fill="#00e5a0"/>
  <!-- F letter mark subtle -->
  <text x="17" y="48" font-family="serif" font-size="23" font-weight="bold" fill="rgba(0,229,160,0.25)">F</text>
</svg>