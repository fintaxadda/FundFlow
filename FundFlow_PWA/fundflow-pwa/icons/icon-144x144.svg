<svg xmlns="http://www.w3.org/2000/svg" width="144" height="144" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1829"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5a0"/>
      <stop offset="100%" style="stop-color:#00b37a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="144" height="144" rx="31" fill="url(#bg)"/>
  <!-- Grid lines subtle -->
  <line x1="21" y1="72" x2="122" y2="72" stroke="#1e2d45" stroke-width="2"/>
  <line x1="72" y1="21" x2="72" y2="122" stroke="#1e2d45" stroke-width="2"/>
  <!-- Chart wave path -->
  <polyline 
    points="17,103 40,79 60,89 83,50 103,40 126,25"
    fill="none" stroke="url(#wave)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dot at peak -->
  <circle cx="126" cy="25" r="8" fill="#00e5a0"/>
  <!-- F letter mark subtle -->
  <text x="20" y="54" font-family="serif" font-size="25" font-weight="bold" fill="rgba(0,229,160,0.25)">F</text>
</svg>