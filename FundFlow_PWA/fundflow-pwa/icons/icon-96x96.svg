<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1829"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5a0"/>
      <stop offset="100%" style="stop-color:#00b37a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="96" height="96" rx="21" fill="url(#bg)"/>
  <!-- Grid lines subtle -->
  <line x1="14" y1="48" x2="81" y2="48" stroke="#1e2d45" stroke-width="1"/>
  <line x1="48" y1="14" x2="48" y2="81" stroke="#1e2d45" stroke-width="1"/>
  <!-- Chart wave path -->
  <polyline 
    points="11,69 26,52 40,59 55,33 69,26 84,17"
    fill="none" stroke="url(#wave)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dot at peak -->
  <circle cx="84" cy="17" r="5" fill="#00e5a0"/>
  <!-- F letter mark subtle -->
  <text x="13" y="36" font-family="serif" font-size="17" font-weight="bold" fill="rgba(0,229,160,0.25)">F</text>
</svg>